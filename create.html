<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <style>
    *{
      box-sizing:border-box ;
      margin: 0;
      padding: 0;
    }
    body{
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to right, #6158df, rgb(155, 72, 72), rgb(122, 223, 122));
      height: 100vh;
      display: flex;
      justify-content: center; /*center horizontally */
      align-items: center; /*center vertically */
    }

    h2{
      text-align: center;
      color: #2b3131;
    }

    .container{
      /* width: 100%; */
      max-width: 500px;
      box-shadow: 0 4px 8px rgba(0, 0, 0,0.1);
      background-color: #a5783c;
      border-radius: 20px;
      padding: 20px;
      margin: 40px auto 0;
    }

    form{
      display: flex;
      flex-direction: column;
    }
    label{
      margin-top: 5px;
      color: rgb(102,194,159);
    }
    input{
      margin-top: 8px;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc  ;
      border-radius: 10px;
      border-color: 1px solid white;
    }
    input:focus{
      border-color: blue;
      outline: none;

    }
    button{
      margin-top: 20px;
      padding: 12px;
      border-color: #7e7171;
      color: black;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    } 
    button:hover{
      background-color: #378b84;
      color: white;
    }   
  </style>
</head>
<body>
  <section class="signup">
    <h2>Create an account to get started</h2>
    
    <div class="container">
      <form>
        <label for="fname">First name: </label>
        <input type="text" id="fname" name="fnmae">
        <label for="lname">Last name:</label>
        <input type="text" id="lname" name="lname">
        <label for="password">Type your password here: </label>
        <input type="password" name="password" id="password" required min="8" placeholder="Enter a password">
        <label for="password">E-MAIL: </label>
        <input type="email" name="email" id="email" required placeholder="example@gmail.com">
        <button type="submit">Submit</button>
      </form>
    </div>
  </section>
</body>
</html>
